version: "1.0"
project: researcher-ux-platform-improvement
research_question: >
  How can the researcher_ux UX research skills platform be improved in algorithms,
  workflow automation, quality, and capability gaps — leveraging the existing 53-interview
  dataset across 9 product domains and modern AI techniques from the Orchestra ecosystem?
status: complete
current_phase: concluded
hypotheses_shipped: 13
started: "2026-04-27"
last_updated: "2026-04-27"

bootstrap:
  completed: true
  sources_reviewed:
    - "Full codebase: 11 skills, 53 interviews, 9 projects, 400+ deliverables"
    - "Orchestra Research AI-Research-SKILLs: autoresearch, brainstorming, creative-thinking"
    - "Production output audit: DI&A (most complete), CPI (richest data), 7 others partial"
    - "NNG methodology: empathy maps, journey maps, personas, JTBD, scenario mapping"
  baseline_established:
    time_savings: "85-95% vs manual (4-6 weeks → 1-2 days)"
    output_volume: "400+ markdown deliverables across 9 domains"
    skill_maturity: "5 production (empathy/journey/persona/jtbd/ai-opps), 6 beta/concept"
    largest_gaps:
      - "Scenario mapping: 80-90% output gap"
      - "Pain-point matrix: 1 file total across all 9 projects"
      - "Cross-interview analysis: zero systematic pattern detection"
      - "Confidence propagation: low-confidence JTBD pollutes AI opportunity scoring"
      - "Pipeline fragmentation: every skill manually triggered"

hypotheses:
  - id: H1
    slug: semantic-clustering
    priority: 1
    status: shipped
    result: >
      661 FEELS entries, 104 empathy maps. UMAP+HDBSCAN: 14 clusters, 12% noise.
      11/14 universal (5+ products). Key: AI Ambivalence (162 entries, 7/9), Data Fragmentation
      (26 entries, 7/9), Manual Correction Burden (69 entries, 8/9). DI&A manual clusters recovered.
    shipped_date: "2026-04-27"
    experiment: experiments/H1-semantic-clustering/

  - id: H2
    slug: pipeline-automation
    priority: 3
    status: shipped
    result: >
      CONFIRMATORY. Pipeline status audit: 9 projects, 106 transcripts. Empathy+journey: 99-100% complete.
      Real gaps: Fusion (0 JTBD), 3 projects partial JTBD, all 9 projects severely under-generated scenarios
      (13 files vs ~45 expected). /research-pipeline SKILL.md created. pipeline_status.py runs in <1 second.
    shipped_date: "2026-04-27"
    experiment: experiments/H2-pipeline-automation/

  - id: H3
    slug: prompt-optimization-dspy
    priority: 6
    status: shipped
    result: >
      CONFIRMATORY. 105 maps analyzed. Description depth CV=51%, FEELS count CV=69%, quote density CV=41%.
      CDDI has longest transcripts (8k words) but lowest FEELS count (5.3) — confirms prompt, not data, drives quality.
      3 targeted improvements applied to empathy-map-generator SKILL.md: 8-15 entry minimum,
      10-20 word descriptions, 30% quote target. Regex extraction bug in empathy-clustering SKILL.md fixed.
    shipped_date: "2026-04-27"
    experiment: experiments/H3-dspy-prompt-optimization/

  - id: H4
    slug: confidence-propagation
    priority: 5
    status: shipped
    result: >
      DISCONFIRMATORY but revelatory. Blind confidence weighting reclassified 43% P1 (predicted
      25-35%), BUT critically demoted MENA/Brazil (P0, 9/10 pain) to P4 — false demotion.
      Key finding: pain-modulated confidence is correct. High pain (≥8/10) = no frequency penalty.
      Medium pain = mild penalty. Low pain = standard penalty.
    shipped_date: "2026-04-27"
    experiment: experiments/H4-confidence-propagation/

  - id: H5
    slug: cross-project-meta-analysis
    priority: 2
    status: shipped
    result: "cross-project-synthesizer skill created with auto-discovery mode"
    shipped_date: "2026-04-27"
    experiment: experiments/H5-cross-project-synthesizer/

  - id: H6
    slug: figma-creator-hardening
    priority: 7
    status: shipped
    result: >
      CONFIRMATORY. Code audit of 4 skill artifacts. All 5 failure modes (node ID staleness,
      missing visual assets, screenshot dimensions, floating nodes, font order) already documented
      and fixed. 3 minor gaps found and closed: Task tool prompt now references QUICK_REFERENCE.md
      and gold standard JS; screenshot width table added to SKILL.md execution steps; Template Mode
      gets explicit node ID staleness warning. Architectural fix (single execution via Task tool) is
      complete and consistent across all 4 artifacts.
    shipped_date: "2026-04-27"
    experiment: experiments/H6-figma-creator-hardening/

  - id: H7
    slug: pain-matrix-autogen
    priority: 4
    status: shipped
    result: "pain-point-matrix SKILL.md refactored with auto-discovery mode"
    shipped_date: "2026-04-27"
    experiment: experiments/H7-pain-matrix-autogen/

  - id: H8
    slug: cluster-aware-ai-opportunity-scoring
    statement: >
      Using H1 universal cluster taxonomy as weights in ai-opportunity-analyzer would
      produce a more strategically defensible cross-domain AI roadmap.
    prediction: >
      Rerunning cross-project AI opportunity scoring with cluster-aware weights surfaces
      3-5 platform-level AI investments distinct from current per-product P1 lists.
    priority: 3
    status: shipped
    result: >
      CONFIRMATORY with insight. 22 of 24 opportunities re-ranked. 20 reach P0 (ceiling effect reveals
      systematic undervaluation in per-product tiers). 4 demoted to P3 — these are product-specific.
      Key finding: 3 platform capability themes emerge (Data Synthesis, Trust/RAG Infrastructure,
      NL Workflow Automation) — not 3-5 individual investments. Per-product P1 tier systematically
      undervalues universal-cluster investments. Recommendation: reorganize roadmap by cluster, not product.
    shipped_date: "2026-04-27"
    experiment: experiments/H8-cluster-aware-scoring/

  - id: H9
    slug: empathy-clustering-skill
    statement: >
      Productizing the H1 pipeline as a SKILL.md + implementation enables automatic
      cross-domain FEELS clustering for any project with 3+ interviews.
    prediction: >
      New skill produces clustering-analysis.md in <10 minutes for any project with 3+ empathy maps.
    priority: 2
    status: shipped
    result: >
      CONFIRMATORY and exceeded prediction. Single-project (DI&A, 21 maps, 137 entries): 8 clusters,
      4% noise, <10 seconds runtime (vs predicted <10 minutes). All 4 manual DI&A themes recovered.
      4 additional emotional nuances surfaced. Skill callable as /empathy-clustering [project].
    shipped_date: "2026-04-27"
    experiment: experiments/H9-empathy-clustering-skill/

hypotheses:
  - id: H10
    slug: downstream-quality-audit
    priority: 1
    status: shipped
    result: >
      MIXED. File count is the wrong metric — source proximity is what matters.
      Consolidated files with direct transcript quotes (KAI personas) are equivalent to
      individual files. Fusion JTBD (46 jobs) is usable but cites journey map line
      numbers, not transcripts — traceability degrades one layer. Pipeline completeness
      was mismeasured: AI opportunities are 89% complete, scenarios 100% presence.
      Scenario depth (not presence) is the actual gap.
    shipped_date: "2026-04-27"
    experiment: experiments/H10-downstream-quality-audit/

  - id: H11
    slug: traceability-audit
    priority: 2
    status: shipped
    statement: >
      Quote density (verbatim quotes per section) is a measurable proxy for output
      traceability, and at least 2 projects will show systematically low-density files.
    prediction: >
      Bimodal density distribution — some projects (Fusion, KAI) will cluster near 0 while
      others (DI&A, CPI) cluster near 2-3. 15-20% of files below threshold.
    result: >
      PARTIALLY CONFIRMATORY. 148 files audited, 3 low-traceability files (2% — much lower
      than predicted 15-20%). No bimodal distribution — broadly uniform 1.5-3.0.
      Key finding: quote starvation cascade — PT JTBD density 3.66 but AI opps 0.03 and
      scenarios 0.19, because ai-opportunity-analyzer and scenario-mapper synthesise from
      JTBD statements without pulling quotes forward. Structural skill design gap confirmed.
      Fixed: quality gate added to both skills requiring ≥1 verbatim quote per output.
      KAI audit bug: 'overview' exclusion pattern filtered KAI's only persona file.
      8 of 9 projects pipeline-complete (corrected). Fusion AI opps only genuine gap.
    shipped_date: "2026-04-27"
    experiment: experiments/H11-traceability-audit/

current_hypothesis: ~
current_experiment: ~

metrics:
  primary: "Validated improvements shipped (skills updated/created)"
  proxy_coverage: "% of expected skill outputs actually present per project"
  proxy_quality: "Quote-traceability rate (claims backed by user quotes)"
  secondary: "Cross-project universal patterns discovered"

direction: outer_loop
